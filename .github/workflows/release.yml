name: Build Releases

on:
  push:
    branches:
      - main

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-22.04
            artifact_name: OpenAInterface-linux-x64
            archive_format: tar.gz
          - os: windows-latest
            artifact_name: OpenAInterface-windows-x64
            archive_format: zip
          - os: macos-latest
            artifact_name: OpenAInterface-macos-x64
            archive_format: tar.gz

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        run: python build.py

      - name: Package artifact
        shell: bash
        run: |
          cd dist
          if [ "${{ matrix.archive_format }}" = "zip" ]; then
            7z a "${{ matrix.artifact_name }}.zip" OpenAInterface/
          else
            tar -czf "${{ matrix.artifact_name }}.tar.gz" OpenAInterface/
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.artifact_name }}.${{ matrix.archive_format }}
          retention-days: 90